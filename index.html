<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FFEE Studio - 室內設計工程進度管理系統 V2.0</title>

<!-- Tailwind CSS & Google Font -->
<script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
<link href="[https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap)" rel="stylesheet">

<!-- 外部庫 (Vue 3, Firebase, Excel, PDF) -->
<script src="[https://unpkg.com/vue@3/dist/vue.global.js](https://unpkg.com/vue@3/dist/vue.global.js)"></script>
<script src="[https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js](https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js)"></script>
<script src="[https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js](https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js)"></script>
<script src="[https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js](https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js)"></script>
<script src="[https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js](https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js)"></script>
<script src="[https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js](https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js)"></script>
<script src="[https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js](https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js)"></script>

<style>
:root {
  --bg-main: #f1f5f9; --card-bg: #ffffff;
  --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.03);
  --text-main: #0f172a; --text-muted: #64748b; --border-color: #e2e8f0;
  --table-header-bg: #f8fafc; --gantt-day-header: #f1f5f9;
  --gantt-weekend-bg: #fef2f2; --gantt-weekend-text: #ef4444;
  --primary: #4f46e5;
}

body.dark-mode {
  --bg-main: #0f172a; --card-bg: #1e293b;
  --card-shadow: 0 10px 20px rgba(0,0,0,0.3);
  --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: #334155;
  --table-header-bg: #334155; --gantt-day-header: #334155;
  --gantt-weekend-bg: #311c1c; --gantt-weekend-text: #fca5a5;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background-color: var(--bg-main) !important; color: var(--text-main) !important;
  padding: 16px; padding-bottom: 85px; transition: background-color 0.3s;
}

.card {
  background-color: var(--card-bg) !important; color: var(--text-main) !important;
  border-radius: 16px; box-shadow: var(--card-shadow); border: 1px solid var(--border-color);
  padding: 18px; margin-bottom: 16px;
}
.nav-glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid var(--border-color); }
body.dark-mode .nav-glass { background: rgba(30, 41, 59, 0.85); }

input, select, textarea {
  background-color: var(--card-bg) !important; color: var(--text-main) !important;
  border: 1px solid var(--border-color) !important; border-radius: 8px; outline: none; padding: 6px 10px;
}
.btn-pill { border-radius: 10px; font-weight: 600; padding: 8px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }

/* 甘特圖與表格基礎 */
.gantt-container { overflow-x: auto; background: var(--card-bg); position: relative; border-radius: 12px; }
.gantt-wrap { min-width: 850px; position: relative; padding: 8px; }
.gantt-month-row, .gantt-header, .gantt-task-row { display: flex; border-bottom: 1px solid var(--border-color); }
.gantt-task-label { width: 200px; flex-shrink: 0; padding: 8px; border-right: 1px solid var(--border-color); font-weight: 600; }
.gantt-bar-box { flex: 1; position: relative; height: 44px; }
.gantt-bar { position: absolute; height: 26px; top: 14px; border-radius: 8px; color: #fff; font-size: 11px; z-index: 3; cursor: grab; display: flex; align-items: center; justify-content: space-between; }
.gantt-bar.is-critical { border: 2px solid #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.7); }

table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
th { padding: 10px; background-color: var(--table-header-bg); border-bottom: 1px solid var(--border-color); }
td { padding: 8px; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: center; }
.drag-handle { cursor: grab; user-select: none; }
</style>
</head>

<body>
<div id="app"></div>

<!-- 以原生 ES Module 載入專案主入口 -->
<script type="module" src="./src/main.js"></script>
</body>
</html>
